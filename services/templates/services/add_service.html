{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow p-4">

            <h3 class="text-center mb-3">Add New Service</h3>

            <form method="POST">
                {% csrf_token %}

                <label class="form-label">Service Title</label>
                <input type="text" name="title" class="form-control mb-3" required>

                <label class="form-label">Description</label>
                <textarea name="description" class="form-control mb-3" rows="4" required></textarea>

                <label class="form-label">Price ($)</label>
                <input type="number" name="price" class="form-control mb-3" required>

                <button class="btn btn-success w-100">
                    + Add Service
                </button>
            </form>

            <a href="/accounts/seller/" class="btn btn-link mt-3">← Back to Dashboard</a>

        </div>

    </div>
</div>

{% endblock %}
